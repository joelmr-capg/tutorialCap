<div class = "container">
<h1>Lista de Clientes</h1>
<mat-table [dataSource] = "dataSource">
  <ng-container matColumnDef="id">
    <mat-header-cell *matHeaderCellDef> ID </mat-header-cell>
    <mat-cell *matCellDef="let client"> {{client.id}} </mat-cell>
  </ng-container>

  <ng-container matColumnDef="nombre">
    <mat-header-cell *matHeaderCellDef> Nombre </mat-header-cell>
    <mat-cell *matCellDef="let client"> {{client.name}} </mat-cell>
  </ng-container>

  <ng-container matColumnDef="accion">
    <mat-header-cell *matHeaderCellDef></mat-header-cell>
    <mat-cell *matCellDef="let client">
      <button mat-icon-button color = "primary" (click)="editClient(client)"><mat-icon>edit</mat-icon></button>
      <button mat-icon-button color = "accent" (click)="deleteClient(client)"><mat-icon>delete</mat-icon></button>
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></mat-header-row>
  <mat-row *matRowDef = "let row, columns : displayedColumns"></mat-row>
</mat-table>

<div class="button">
  <button mat-flat-button color="primary" (click)="createClient()">Nuevo cliente</button>
</div>
</div>
